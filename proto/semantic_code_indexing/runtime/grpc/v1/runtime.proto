syntax = "proto3";

package semantic_code_indexing.runtime.grpc.v1;

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string service = 2;
}

message CreateIndexRequest {
  string root_path = 1;
  repeated string paths = 2;
  string parser_opts_json = 3;
}

message CreateIndexResponse {
  string snapshot_id = 1;
  string indexed_at = 2;
  int32 file_count = 3;
  int32 unit_count = 4;
  string repo_map_json = 5;
  string index_lifecycle_json = 6;
}

message ResolveContextRequest {
  string root_path = 1;
  repeated string paths = 2;
  string parser_opts_json = 3;
  string query_json = 4;
  string retrieval_policy_json = 5;
}

message ResolveContextResponse {
  string selection_result_json = 1;
}

message ExpandContextRequest {
  string root_path = 1;
  repeated string paths = 2;
  string parser_opts_json = 3;
  string selection_id = 4;
  string snapshot_id = 5;
  repeated string unit_ids = 6;
  string include_impact_hints = 7;
}

message ExpandContextResponse {
  string expansion_result_json = 1;
}

message FetchContextDetailRequest {
  string root_path = 1;
  repeated string paths = 2;
  string parser_opts_json = 3;
  string selection_id = 4;
  string snapshot_id = 5;
  repeated string unit_ids = 6;
  string detail_level = 7;
}

message FetchContextDetailResponse {
  string detail_result_json = 1;
}
